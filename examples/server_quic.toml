bind_addr = "0.0.0.0"
bind_port = 17000
quic_bind_port = 17000
log_level = "info"

[auth]
method = "token"
token = "replace_with_token"

[transport]
protocol = "quic"

[transport.tls]
cert_file = "/path/to/server.crt"
key_file = "/path/to/server.key"
# The certificate should contain the public hostname/IP in subjectAltName.
# QUIC uses UDP, so make sure the QUIC port is allowed by the network/firewall.

[[allow_ports]]
start = 6001
end = 7000
