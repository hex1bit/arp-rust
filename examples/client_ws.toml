server_addr = "127.0.0.1"
server_port = 17000
log_level = "info"

[auth]
method = "token"
token = "replace_with_token"

[transport]
protocol = "websocket"
pool_count = 1

[transport.tls]
# Set enable = true to use WSS instead of plain WS.
enable = false
# trusted_ca_file = "/path/to/server.crt"
# server_name = "your.server.name"
# server_name must match the server certificate SAN/CN.

[[proxies]]
name = "ssh_ws"
type = "tcp"
local_ip = "127.0.0.1"
local_port = 22
remote_port = 6001
