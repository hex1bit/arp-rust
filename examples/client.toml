server_addr = "127.0.0.1"
server_port = 17000

log_level = "info"
# Optional: write logs to file with daily rotation.
# If not set, logs go to stdout.
# log_file = "/var/log/arp/arpc"
# log_max_days = 1

# Client admin API (optional) — enables dynamic proxy management and diagnostics.
# When configured, you can use `arpc status` / `arpc check` and the REST API.
admin_addr = "127.0.0.1"
admin_port = 7400
# admin_user = "admin"
# admin_pwd = "secret"

[auth]
method = "token"
token = "replace_with_token"

[transport]
protocol = "tcp"
pool_count = 1

[[proxies]]
name = "test_ssh"
type = "tcp"
local_ip = "127.0.0.1"
local_port = 22
remote_port = 6000
