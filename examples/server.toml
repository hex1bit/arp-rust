bind_addr = "0.0.0.0"
bind_port = 17000

log_level = "info"
# Optional: write logs to file with daily rotation.
# If not set, logs go to stdout.
# log_file = "/var/log/arp/arps"
# log_max_days = 1

[auth]
method = "token"
token = "replace_with_token"

[transport]
protocol = "tcp"
tcp_mux = true

[[allow_ports]]
start = 6000
end = 7000

[[allow_ports]]
start = 8000
end = 9000
